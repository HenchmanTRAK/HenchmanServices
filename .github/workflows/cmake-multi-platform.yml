# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on: 
  workflow_dispatch:
  push:
    # tags:
      # - '*'
    branches:
      - 'main'

env:
  VERSION: 1.1.5
  CURR_VERSION: 1.1.5

jobs:
  setup:
    runs-on: ${{ matrix.os }}
    
    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: true

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [windows-latest]
        build_type: [Release]
        c_compiler: [cl]
        arch: [x64]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            arch: x64
    outputs:
        VERSION: ${{steps.set-version.outputs.version}}
        CURR_VERSION: ${{steps.find-latest-tag.outputs.tag}}
        VERSION_NUMBER: ${{steps.solid-version-numbers.outputs.VERSION_NUMBER}}
        CURR_VERSION_NUMBER: ${{steps.solid-version-numbers.outputs.CURR_VERSION_NUMBER}}
    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: "Checking for OpenSSL"
      shell: bash
      run: |
        ls -alS "C:/Program Files/OpenSSL"

    - name: Set version variables
      id: set-version
      shell: bash
      run: |
        VER=$(cat version)
        # echo "VERSION=$(echo $VER | tr -dc '0-9')" >> $GITHUB_ENV
        # echo "version=$(echo $VER | tr -dc '0-9')" >> $GITHUB_OUTPUT
        echo "VERSION=$VER" >> $GITHUB_ENV
        echo "version=$VER" >> $GITHUB_OUTPUT

    - name: "Getting current release version"
      uses: oprypin/find-latest-tag@v1
      with:
        repository: ${{ github.repository }}
        regex: '^\d+\.\d+\.\d+$'
      id: find-latest-tag

    - name: "Setting current release version"
      id: set-curr-version
      shell: bash
      run: |
        echo "CURR_VERSION=${{ steps.find-latest-tag.outputs.tag }}" >> $GITHUB_ENV
        echo "curr_version=${{ steps.find-latest-tag.outputs.tag }}" >> $GITHUB_OUTPUT
        # echo "CURR_VERSION=$(echo ${{ steps.find-latest-tag.outputs.tag }} | tr -dc '0-9')" >> $GITHUB_ENV
        # echo "curr_version=$(echo ${{ steps.find-latest-tag.outputs.tag }} | tr -dc '0-9')" >> $GITHUB_OUTPUT

    - name: "Convering to solid numbers"
      id: solid-version-numbers
      shell: bash
      run: |
        currVer=${{steps.set-curr-version.outputs.curr_version}}
        futureVer=${{steps.set-version.outputs.version}}
        splitCurrVer=(${currVer//./ })
        splitNewVer=(${futureVer//./ })
        oldVer=$((splitCurrVer[0]*100 + splitCurrVer[1]*10 + splitCurrVer[2]))
        newVer=$((splitNewVer[0]*100 + splitNewVer[1]*10 + splitNewVer[2]))
        echo "CURR_VERSION_NUMBER=$(echo $oldVer)" >> $GITHUB_OUTPUT
        echo "VERSION_NUMBER=$(echo $newVer)" >> $GITHUB_OUTPUT

  build:
    needs: [setup]  
    if: ${{ needs.setup.outputs.VERSION_NUMBER > needs.setup.outputs.CURR_VERSION_NUMBER }}

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: true

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [windows-latest]
        build_type: [Release]
        c_compiler: [cl]
        arch: [x64]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            arch: x64

    steps:
    - uses: actions/checkout@v4
  
    - name: "Checking needs output"	
      shell: bash	
      run: |	
        echo ${{needs.setup.outputs.VERSION}}	
        echo ${{needs.setup.outputs.CURR_VERSION}}	
        echo ${{needs.setup.outputs.VERSION_NUMBER}}	
        echo ${{needs.setup.outputs.CURR_VERSION_NUMBER}}
  
    - name: Generate empty ini file.
      id: ini_file
      shell: cmd
      run: |
        cd ${{ github.workspace }} && echo $(cat example_service.ini) > service.ini

    - name: Install NSIS for CPack installer generation.
      uses: repolevedavaj/install-nsis@v1.1.0
      with:
        nsis-version: '3.10'

    # - uses: ilammy/msvc-dev-cmd@v1.4.1
    #   with:
    #     arch: ${{ matrix.arch }}
    
    - name: Setup Graphviz
      uses: ts-graphviz/setup-graphviz@v2
  
    - uses: ssciwr/doxygen-install@v1
    
    - name: Install OpenSSL (Windows)
      id: "openssl"
      shell: powershell
      run: |
        echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
        vcpkg install

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        dir: '${{ github.workspace }}/'
        install-deps: 'true'

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      # run: >
      #   cmake -B ${{ github.workspace }}/build
      #   -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
      #   -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
      #   -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      #   -S ${{ github.workspace }}
      run: >
        cmake -B ${{ github.workspace }}/build
        --preset x64-release
        -S ${{ github.workspace }}

    - name: "Checking for version set"
      run: echo VERSION=$env:VERSION

    - name: Test
      working-directory: ${{ github.workspace }}/build
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Build
      id: cmake_build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake -DCPACK_PACKAGE_FILE_NAME="HenchmanService-latest-win64" --build ${{ github.workspace }}/build --config ${{ matrix.build_type }} --target PACKAGE && echo "output-exe=${*.exe}" >> "$env:GITHUB_OUTPUT"

    - name: Release
      uses: softprops/action-gh-release@v2
      #if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{needs.setup.outputs.VERSION}}
        name: Release ${{needs.setup.outputs.VERSION}}
        # files: "${{ github.workspace }}/build/HenchmanService-${{needs.setup.outputs.VERSION}}-win64.exe"
        files: "${{ github.workspace }}/build/HenchmanService-latest-win64.exe"
        make_latest: 'true'
